<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to CynexCloud</title>
</head>
<body style="background-color: #0a0a0a; color: #e4e4e7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 40px 20px;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 560px; background-color: #141414; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; overflow: hidden;">
    <!-- Header -->
    <tr>
      <td style="padding: 36px 32px 28px 32px; border-bottom: 1px solid rgba(255,255,255,0.06);">
        <span style="font-size: 14px; font-weight: 700; letter-spacing: 0.5px; color: #ffffff; text-transform: uppercase;">CynexCloud</span>
      </td>
    </tr>
    <!-- Content -->
    <tr>
      <td style="padding: 36px 32px;">
        <h1 style="font-size: 20px; font-weight: 700; color: #ffffff; margin: 0 0 16px 0; letter-spacing: -0.3px;">Welcome, {{username}}</h1>
        <p style="font-size: 14px; line-height: 22px; color: #a1a1aa; margin: 0 0 32px 0;">
          Your account is now active. You have full access to CynexCloud's game hosting, cloud compute, and control panel.
        </p>
        <table border="0" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center" style="border-radius: 8px; background-color: #ffffff;">
              <a href="https://cynexcloud.eu.cc/auth" target="_blank" style="display: inline-block; font-size: 13px; font-weight: 700; color: #000000; text-decoration: none; padding: 12px 28px; border-radius: 8px;">
                Go to Dashboard
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <!-- Footer -->
    <tr>
      <td align="center" style="padding: 24px 32px; border-top: 1px solid rgba(255,255,255,0.06);">
        <p style="font-size: 11px; color: #3f3f46; margin: 0; line-height: 16px;">
          If you did not create this account, you can ignore this email.
        </p>
        <p style="font-size: 11px; color: #27272a; margin: 8px 0 0 0;">
          &copy; 2026 CynexCloud. All rights reserved.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
